body:
  text: 逆降義或問曰甥姪亦可施於伯叔從母耶答曰伯叔有父名則兄弟之子不得姓從母有母名則姊妹之子不可言甥且甥姪唯施於姑舅耳何者姪之言實也甥之言生也女子雖出情不自絕故於兄弟之子稱其情實男子居內據自我出故於姊妹之子言其出生伯叔本內不得言實從母俱出不得言甥然則謂吾伯叔者吾謂之子弟之子謂吾從母者吾謂之姊妹之子
